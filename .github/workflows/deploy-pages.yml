name: Deploy to GitHub Pages

on:
  push:
    branches:
      - claude/composition-tavern-spec-ipg716
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時実行は1つに絞る（古い実行はキャンセル）
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Configure GitHub Pages
        # Pages が未設定でも自動で有効化する
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - run: npm ci

      - name: Build (static export)
        run: npm run build
        env:
          GITHUB_PAGES: "true"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
